version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cto_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-cto_database}
    ports:
      - "5602:5602"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: cto_backend
    restart: always
    environment:
      - PORT=5600
      - DATABASE_URL=postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-secret}@db:5432/${POSTGRES_DB:-cto_database}
      # Tell Puppeteer to use the installed system Chromium
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
    ports:
      - "5600:5600"
    depends_on:
      - db
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: cto_frontend
    restart: always
    environment:
      - VITE_API_BASE_URL=http://localhost:5600
    ports:
      - "5601:5601"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev

volumes:
  pgdata:
